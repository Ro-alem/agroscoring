version: '3.9'

services:
  agroskoring:
    build: .
    container_name: agroskoring_app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    volumes:
      - ./ml/artifacts:/app/ml/artifacts  # persist trained model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy (опционально)
  nginx:
    image: nginx:alpine
    container_name: agroskoring_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agroskoring
    restart: unless-stopped
    profiles:
      - production
